<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Dwarven Deep</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #0a0a0a;
        color: #ddd;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        overflow: hidden;
        height: 100%;
        width: 100%;
        user-select: none;
        -webkit-user-select: none;
      }
      #game {
        display: block;
        width: 100vw;
        height: 100vh;
        background: #000;
        image-rendering: pixelated;
        image-rendering: -moz-crisp-edges;
        touch-action: none;
      }
      #ui {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }
      #ui > * {
        pointer-events: auto;
      }
      .panel {
        background: rgba(20, 20, 24, 0.85);
        border: 1px solid #444;
        color: #ddd;
        padding: 8px 12px;
        font-size: 12px;
        line-height: 1.4;
      }
      .btn {
        background: #2a2a30;
        border: 1px solid #555;
        color: #ddd;
        padding: 6px 12px;
        font-family: inherit;
        font-size: 12px;
        cursor: pointer;
      }
      .btn:hover { background: #3a3a44; }
      .btn.active { background: #555; border-color: #888; }
      .btn:disabled { opacity: 0.4; cursor: default; }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="ui"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
